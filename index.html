<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gardenrouse Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; 
            background-color: #f2faf2; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            -webkit-font-smoothing: antialiased; 
        }
        .app-container { position: relative; width: 100%; height: 100%; }
        
        #plant-img { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; display: block; z-index: 1; 
        }
        
        /* Панель USDT (Зліва) */
        .balance-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            color: #2e7d32;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            cursor: pointer;
        }

        /* Панель Rose (Справа) */
        .score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 10px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            color: #2e7d32;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .button-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            transition: transform 0.1s;
        }

        .btn:active { transform: scale(0.95); }
        .btn:disabled { background-color: #9e9e9e; transform: scale(1); cursor: not-allowed; }

        #timer {
            font-size: 14px;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
            display: none;
            box-shadow: 0 4px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .rules-icon {
    position: absolute;
    top: 80px;
    left: 20px; /* Регулюй це число, щоб іконка не налізала на Rose */
    background: rgba(255, 255, 255, 0.9);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #2e7d32;
    cursor: pointer;
    z-index: 9999;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    border: 1px solid #2e7d32;
    font-size: 25px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="balance-panel" onclick="requestWithdrawal()">
            💰 <span id="usdt-balance">0.00</span> USDT
        </div>

        <div class="rules-icon" onclick="showRules()">ⓘ</div>
        
        <div id="score-container" class="score-panel"></div>

        <img id="plant-img" src="stage_1_cat.png">

        <div class="button-panel">
            <div id="timer"></div>
            <button id="water-btn" class="btn">💧 Полити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const levels = {
            1: { goal: 50, nextBreak: 0 },
            2: { goal: 150, nextBreak: 3600 }, 
            3: { goal: 300, nextBreak: 3600 }, 
            4: { goal: 500, nextBreak: 14400 }, 
            5: { goal: 1000, nextBreak: 0 },
            6: { goal: 0, isFinal: true }
        };

        // Завантаження даних
        let points = parseInt(localStorage.getItem('rose_points')) || 0;
        let currentStage = parseInt(localStorage.getItem('garden_stage')) || 1;
        let usdtBalance = parseFloat(localStorage.getItem('usdt_balance')) || 0.00;
        let timerInterval = null;

        // Початковий запуск
        updateUI();
        checkCooldown();

        function updateUI() {
            const plantImg = document.getElementById('plant-img');
            const scoreContainer = document.getElementById('score-container');
            const usdtDisplay = document.getElementById('usdt-balance');
            const btn = document.getElementById('water-btn');

            // Оновлення балансу USDT
            usdtDisplay.innerText = usdtBalance.toFixed(2);
            
            // Зображення стадії
            plantImg.src = `stage_${currentStage}_cat.png`;

            if (levels[currentStage].isFinal) {
                // Спеціальний вигляд для обміну
                scoreContainer.innerHTML = `🌸 Букет готовий!`;
                btn.innerText = "💰 Обміняти на USDT";
                btn.style.backgroundColor = "#f3ba2f";
                btn.onclick = exchangeRoseToUsdt;
            } else {
                // Стандартний вигляд для гри
                scoreContainer.innerHTML = `🌸 Rose: ${points}/${levels[currentStage].goal}`;
                btn.innerText = "💧 Полити";
                btn.style.backgroundColor = "#4CAF50";
                btn.onclick = handleWatering;
            }
        }

        function handleWatering() {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            points += 10;
            let nextUnlockDelay = 180; // 3 хв

            if (points >= levels[currentStage].goal && !levels[currentStage].isFinal) {
                const breakTime = levels[currentStage].nextBreak;
                if (breakTime > 0) nextUnlockDelay = breakTime;

                currentStage++;
                points = 0;
                
                if (currentStage === 6) {
                    tg.showAlert("✨ Вітаємо! Ти виростила букет! Тепер його можна обміняти.");
                } else {
                    tg.showAlert(`Рівень ${currentStage-1} пройдено! Потрібен час на ріст...`);
                }
            }

            // Збереження
            const unlockTime = Date.now() + (nextUnlockDelay * 1000);
            localStorage.setItem('unlock_time', unlockTime);
            localStorage.setItem('rose_points', points);
            localStorage.setItem('garden_stage', currentStage);
            
            updateUI();
            checkCooldown();
        }

        function exchangeRoseToUsdt() {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            usdtBalance += 0.06;
            currentStage = 1;
            points = 0;

            localStorage.setItem('usdt_balance', usdtBalance);
            localStorage.setItem('garden_stage', currentStage);
            localStorage.setItem('rose_points', points);
            localStorage.removeItem('unlock_time');

            tg.showAlert("✨ Обмін успішний! 0.06 USDT нараховано. Починаємо новий букет! 🌱");
            
            updateUI();
            checkCooldown();
        }

        function checkCooldown() {
            const btn = document.getElementById('water-btn');
            const timerDisplay = document.getElementById('timer');
            const unlockTime = parseInt(localStorage.getItem('unlock_time')) || 0;
            const now = Date.now();

            if (unlockTime > now && currentStage < 6) {
                clearInterval(timerInterval);
                btn.disabled = true;
                timerDisplay.style.display = 'block';

                timerInterval = setInterval(() => {
                    const timeLeft = Math.floor((unlockTime - Date.now()) / 1000);

                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerDisplay.style.display = 'none';
                        btn.disabled = false;
                        localStorage.removeItem('unlock_time');
                        return;
                    }

                    if (timeLeft > 300) {
                        let h = Math.floor(timeLeft / 3600);
                        let m = Math.floor((timeLeft % 3600) / 60);
                        let s = timeLeft % 60;
                        timerDisplay.innerText = `Ріст: ${h}г ${m}хв ${s}с`;
                    } else {
                        let m = Math.floor(timeLeft / 60);
                        let s = timeLeft % 60;
                        timerDisplay.innerText = `Наступний полив: ${m}:${s < 10 ? '0' : ''}${s}`;
                    }
                }, 1000);
            } else {
                btn.disabled = false;
                timerDisplay.style.display = 'none';
            }
        }

        function requestWithdrawal() {
            if (usdtBalance <= 0) {
                tg.showAlert("У вас ще немає USDT для виводу.");
                return;
            }

            tg.showPopup({
                title: 'Вивід USDT',
                message: `Ваш баланс: ${usdtBalance.toFixed(2)} USDT. Бажаєте замовити виплату чеком CryptoBot?`,
                buttons: [
                    {id: 'withdraw', type: 'default', text: 'Замовити виплату'},
                    {id: 'cancel', type: 'destructive', text: 'Скасувати'}
                ]
            }, function(buttonId) {
                if (buttonId === 'withdraw') {
                    tg.showAlert("Запит надіслано! Напишіть адміністратору ваш ID для отримання USDT.");
                }
            });
        }
                function showRules() {
    tg.showPopup({
        title: 'Правила Gardenrouse',
        message: '1. Накопичуйте бали, поливаючи квітку.\n2. 1000 Rose можна обміняти на 0.06 USDT.\n3. Виплата проводиться вручну адміністратором.\n4. Будь-які спроби зламку чи накрутки — бан.',
        buttons: [{type: 'ok', text: 'Зрозуміло'}]
            });
        }
    </script>
</body>
    </html>
