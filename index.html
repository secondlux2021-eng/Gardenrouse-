<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gardenrouse Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #f2faf2; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
        .app-container { position: relative; width: 100%; height: 100%; }
        
        #plant-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; z-index: 1; }
        
        .score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            color: #2e7d32; /* Твій попередній колір */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .button-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        .btn:disabled {
            background-color: #9e9e9e;
            transform: scale(0.98);
            cursor: not-allowed;
        }

        #timer {
            font-size: 15px;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 500;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <img id="plant-img" src="stage_1_cat.png" alt="Garden">
        
        <div id="score-container" class="score-panel">🌸 Rose: <span id="points">0</span>/50</div>

        <div class="button-panel">
            <div id="timer">Полив через: 03:00</div>
            <button id="water-btn" class="btn" onclick="startWatering()">💧 Полити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let points = parseInt(localStorage.getItem('rose_points')) || 0;
        let currentStage = parseInt(localStorage.getItem('garden_stage')) || 1;
        const cooldownTime = 180;

        updateUI();

        function updateUI() {
            const plantImg = document.getElementById('plant-img');
            const scoreContainer = document.getElementById('score-container');
            
            if (currentStage >= 2) {
                plantImg.src = 'stage_2_cat.jpg';
                // Оновлюємо текст цілі на 150 і прибираємо пробіл
                scoreContainer.innerHTML = `🌸 Rose: <span id="points">${points}</span>/150`;
            } else {
                plantImg.src = 'stage_1_cat.png';
                scoreContainer.innerHTML = `🌸 Rose: <span id="points">${points}</span>/50`;
            }
        }

        function startWatering() {
            const btn = document.getElementById('water-btn');
            const timerDisplay = document.getElementById('timer');
            btn.disabled = true;
            timerDisplay.style.display = 'block';

            // Нарахування балів
            points += 10;

            // Логіка переходу та обнулення
            if (currentStage === 1 && points >= 50) {
                currentStage = 2;
                points = 0; // Скидаємо до 0 для нової стадії
                localStorage.setItem('garden_stage', currentStage);
                tg.showAlert("🎉 Вітаємо! Твій росток розцвів! Тепер збирай 150 Rose.");
            }

            localStorage.setItem('rose_points', points);
            updateUI();

            let timeLeft = cooldownTime;
            const interval = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerDisplay.innerText = `Полив через: ${mins}:${secs < 10 ? '0' : ''}${secs}`;

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    btn.disabled = false;
                    timerDisplay.style.display = 'none';
                }
            }, 1000);
        }
    </script>
</body>
</html>
