<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gardenrouse Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #f2faf2; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
        .app-container { position: relative; width: 100%; height: 100%; }
        #plant-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: block; z-index: 1; }
        
        .score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 18px;
            color: #2e7d32;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .button-panel {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }

        .btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background-color: #9e9e9e; transform: scale(1); cursor: not-allowed; }

        #timer {
            font-size: 14px;
            color: #333;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 600;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <img id="plant-img" src="stage_1_cat.png">
        <div id="score-container" class="score-panel"></div>

        <div class="button-panel">
            <div id="timer"></div>
            <button id="water-btn" class="btn" onclick="handleWatering()">💧 Полити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const levels = {
            1: { goal: 50, nextBreak: 0 },
            2: { goal: 150, nextBreak: 3600 }, 
            3: { goal: 300, nextBreak: 3600 }, 
            4: { goal: 500, nextBreak: 14400 }, 
            5: { goal: 1000, nextBreak: 0 },
            6: { goal: 0, isFinal: true }
        };

        let points = parseInt(localStorage.getItem('rose_points')) || 0;
        let currentStage = parseInt(localStorage.getItem('garden_stage')) || 1;
        let lastCompletionDate = localStorage.getItem('last_completion_date') || "";
        let timerInterval = null;

        updateUI();
        checkGlobalCooldown();

        function updateUI() {
            const plantImg = document.getElementById('plant-img');
            const scoreContainer = document.getElementById('score-container');
            const btn = document.getElementById('water-btn');

            plantImg.src = `stage_${currentStage}_cat.png`;

            if (levels[currentStage].isFinal) {
                scoreContainer.innerHTML = `🌸 Букет зібрано!`;
                btn.innerText = "Чекаємо завтра";
                btn.disabled = true;
            } else {
                scoreContainer.innerHTML = `🌸 Rose: ${points}/${levels[currentStage].goal}`;
                btn.innerText = "💧 Полити";
            }
        }

        function handleWatering() {
            tg.HapticFeedback.impactOccurred('medium');

            const today = new Date().toLocaleDateString();
            if (currentStage === 6 && lastCompletionDate === today) {
                tg.showAlert("Сьогодні врожай вже зібрано! Приходь завтра 🌱");
                return;
            }

            points += 10;

            if (points >= levels[currentStage].goal && !levels[currentStage].isFinal) {
                const breakTime = levels[currentStage].nextBreak;
                
                if (breakTime > 0) {
                    const unlockTime = Date.now() + (breakTime * 1000);
                    localStorage.setItem('unlock_time', unlockTime);
                }

                currentStage++;
                points = 0;

                if (currentStage === 6) {
                    lastCompletionDate = new Date().toLocaleDateString();
                    localStorage.setItem('last_completion_date', lastCompletionDate);
                    tg.showAlert("✨ Неймовірно! Ти виростила прекрасний букет!");
                } else {
                    tg.showAlert(`Рівень ${currentStage-1} пройдено! Потрібен час для росту...`);
                }
                
                localStorage.setItem('garden_stage', currentStage);
            }

            localStorage.setItem('rose_points', points);
            updateUI();

            // Якщо після переходу на новий рівень активувався великий кулдаун
            if (localStorage.getItem('unlock_time')) {
                checkGlobalCooldown();
            } else {
                startTimer(180); // Звичайна перерва 3 хв
            }
        }

        function startTimer(seconds, isGlobal = false) {
            const btn = document.getElementById('water-btn');
            const timerDisplay = document.getElementById('timer');
            
            clearInterval(timerInterval);
            btn.disabled = true;
            timerDisplay.style.display = 'block';

            let timeLeft = seconds;
            
            timerInterval = setInterval(() => {
                timeLeft--;
                
                if (isGlobal) {
                    let h = Math.floor(timeLeft / 3600);
                    let m = Math.floor((timeLeft % 3600) / 60);
                    let s = timeLeft % 60;
                    timerDisplay.innerText = `Ріст триває: ${h}г ${m}хв ${s}с`;
                } else {
                    let m = Math.floor(timeLeft / 60);
                    let s = timeLeft % 60;
                    timerDisplay.innerText = `Наступний полив: ${m}:${s < 10 ? '0' : ''}${s}`;
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.style.display = 'none';
                    localStorage.removeItem('unlock_time');
                    btn.disabled = false;
                }
            }, 1000);
        }

        function checkGlobalCooldown() {
            const unlockTime = parseInt(localStorage.getItem('unlock_time')) || 0;
            const now = Date.now();

            if (unlockTime > now) {
                let timeLeft = Math.floor((unlockTime - now) / 1000);
                startTimer(timeLeft, true);
            }
        }
    </script>
</body>
</html>
