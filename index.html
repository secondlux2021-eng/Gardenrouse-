<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gardenrouse Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #f2faf2;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Картинка на весь екран */
        #plant-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Контейнер для кнопки */
        .button-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%; /* На весь екран, щоб керувати позицією всередині */
            pointer-events: none; /* Щоб панель не заважала натискати на фон (якщо треба) */
            display: flex;
            /* Зміщуємо кнопку вниз і вправо */
            justify-content: flex-end; 
            align-items: flex-end;
            padding-right: 20px; /* Відступ від правого краю */
            padding-bottom: 30px; /* Відступ від нижнього краю */
            box-sizing: border-box;
        }

        .btn {
            pointer-events: auto; /* Повертаємо можливість кліку кнопці */
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }

        .btn:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>
    <div class="app-container">
        <img id="plant-img" src="stage_1_cat.png" alt="Garden">

        <div class="button-panel">
            <button class="btn">💧 Полити</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
    </script>
</body>
</html>
