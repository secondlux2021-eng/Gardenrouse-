<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gardenrouse</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ads.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0fdf4; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Стиль балансу як на твоєму скріншоті */
        #balance-header { width: 100%; display: flex; justify-content: center; gap: 10px; padding: 20px 0; }
        .score-pill { background: white; padding: 10px 20px; border-radius: 30px; border: 2px solid #ffd700; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 5px; }

        /* Контейнер для картинки (по центру) */
        #flower-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #flower-img { width: 80%; max-width: 300px; height: auto; }

        /* Кнопка в самому низу */
        #controls { padding-bottom: 40px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .btn-water { background: #22c55e; color: white; border: none; padding: 20px 0; width: 85%; font-size: 24px; border-radius: 20px; cursor: pointer; box-shadow: 0 6px 0 #16a34a; font-weight: bold; }
        .btn-water:active { transform: translateY(3px); box-shadow: 0 3px 0 #16a34a; }
        .btn-water:disabled { background: #94a3b8; box-shadow: 0 6px 0 #64748b; }
        #timer { margin-bottom: 10px; color: #ef4444; font-weight: bold; font-size: 18px; height: 20px; }
    </style>
</head>
<body>

<div id="balance-header">
    <div class="score-pill">🌹 <span id="rose-bal">0</span></div>
    <div class="score-pill">💰 <span id="usdt-bal">0.000</span> USDT</div>
</div>

<div id="flower-container">
    <img id="flower-img" src="img/stage_1_cat.png" alt="Flower">
</div>

<div id="controls">
    <div id="timer"></div>
    <button id="water-btn" class="btn-water">💧 Полити</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // === ТУТ ТВІЙ ID ===
    const ADSGRAM_BLOCK_ID = "26373"; 

    let level = parseInt(localStorage.getItem('g_lvl')) || 1;
    let rose = parseInt(localStorage.getItem('g_rose')) || 0;
    let usdt = parseFloat(localStorage.getItem('g_usdt')) || 0;
    let next = parseInt(localStorage.getItem('g_time')) || 0;

    const img = document.getElementById('flower-img');
    const btn = document.getElementById('water-btn');
    const timerText = document.getElementById('timer');

    function update() {
        document.getElementById('rose-bal').innerText = rose;
        document.getElementById('usdt-bal').innerText = usdt.toFixed(3);
        img.src = `img/stage_${level}_cat.png`; // Авто-шлях до картинки
        
        const now = Date.now();
        if (now < next) {
            btn.disabled = true;
            startCountdown();
        } else {
            btn.disabled = false;
        }
    }

    function startCountdown() {
        const itv = setInterval(() => {
            const rem = Math.round((next - Date.now()) / 1000);
            if (rem <= 0) {
                clearInterval(itv);
                update();
            } else {
                let m = Math.floor(rem / 60);
                let s = rem % 60;
                timerText.innerText = `До поливу: ${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }, 1000);
    }

    btn.onclick = async () => {
        if (window.Adsgram) {
            const ad = window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID });
            try {
                const res = await ad.show();
                if (res.done) { award(); }
            } catch (e) { award(); } 
        } else { award(); }
    };

    function award() {
        rose += 10;
        usdt += 0.003;
        if (level < 6) level++;
        next = Date.now() + 3600000; // 1 година

        localStorage.setItem('g_lvl', level);
        localStorage.setItem('g_rose', rose);
        localStorage.setItem('g_usdt', usdt);
        localStorage.setItem('g_time', next);
        update();
    }

    update();
</script>
</body>
</html>
