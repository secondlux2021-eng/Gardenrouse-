<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gardenrouse - Task&Click</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/adsgram-ads.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0fdf4; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; color: #166534; }
        #wallet-container { position: absolute; top: 20px; left: 20px; background: #fff; padding: 8px 16px; border-radius: 50px; border: 2px solid #ffd700; display: flex; align-items: center; gap: 10px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #flower-container { font-size: 120px; margin-bottom: 20px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }
        .btn { background: #22c55e; color: white; border: none; padding: 18px 40px; font-size: 20px; border-radius: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 0 #16a34a; font-weight: bold; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #16a34a; }
        .btn:disabled { background: #94a3b8; box-shadow: 0 5px 0 #64748b; opacity: 0.7; }
        #timer { margin-top: 15px; color: #ef4444; font-weight: bold; font-size: 18px; min-height: 24px; }
    </style>
</head>
<body>

<div id="wallet-container">
    <span>💰</span> <span id="balance-display">0.00</span> <span>USDT</span>
</div>

<div id="flower-container">🌱</div>
<button id="water-btn" class="btn">💧 Полити</button>
<div id="timer"></div>

<script>
    // === КОНФІГУРАЦІЯ ===
    const ADSGRAM_BLOCK_ID = "27250"; 
    const stages = ["🌱", "🌿", "🎋", "🌵", "🎍", "🌹"];

    // Завантаження даних з пам'яті телефону
    let level = parseInt(localStorage.getItem('garden_level')) || 1;
    let balance = parseFloat(localStorage.getItem('garden_balance')) || 0;
    let nextWaterTime = parseInt(localStorage.getItem('next_water_time')) || 0;

    const flower = document.getElementById('flower-container');
    const btn = document.getElementById('water-btn');
    const timerText = document.getElementById('timer');
    const balanceText = document.getElementById('balance-display');

    // Ініціалізація стану при запуску
    updateUI();
    checkTimer();

    const AdController = window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID });

    btn.onclick = async () => {
        try {
            const result = await AdController.show();
            if (result.done) {
                balance += 10;
                grow();
                saveData();
            }
        } catch (e) {
            alert("Реклама готується, спробуйте ще раз через хвилину!");
        }
    };

    function grow() {
        if (level < 6) {
            level++;
            let waitTime = level <= 3 ? 3600 : 14400; // 1 год або 4 год
            nextWaterTime = Date.now() + (waitTime * 1000);
            updateUI();
            checkTimer();
        } else {
            alert("Ваша троянда розквітла! Ви справжній майстер! 🌹");
        }
    }

    function updateUI() {
        flower.innerText = stages[level - 1];
        balanceText.innerText = (balance / 100).toFixed(2);
    }

    function saveData() {
        localStorage.setItem('garden_level', level);
        localStorage.setItem('garden_balance', balance);
        localStorage.setItem('next_water_time', nextWaterTime);
    }

    function checkTimer() {
        const interval = setInterval(() => {
            let now = Date.now();
            let remain = Math.round((nextWaterTime - now) / 1000);

            if (remain <= 0) {
                clearInterval(interval);
                btn.disabled = false;
                timerText.innerText = "";
            } else {
                btn.disabled = true;
                let h = Math.floor(remain / 3600);
                let m = Math.floor((remain % 3600) / 60);
                let s = remain % 60;
                timerText.innerText = `Наступний полив: ${h > 0 ? h + 'г ' : ''}${m}хв ${s}с`;
            }
        }, 1000);
    }
</script>
</body>
</html>
